name: Deploy Terprint AI Stock Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_CONTAINER_REGISTRY: cracidnidev.azurecr.io
  IMAGE_NAME: terprint-ai-stock
  CONTAINER_APP_NAME: ca-terprint-stock
  RESOURCE_GROUP: rg-dev-acidni-shared
  
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.ORG_AZURE_CREDENTIALS }}
      
      - name: Log in to Azure Container Registry
        run: |
          az acr login --name cracidnidev
      
      - name: Build and push Docker image
        run: |
          # Generate unique tag based on commit SHA
          IMAGE_TAG="dev-${{ github.sha }}"
          
          # Build image
          docker build -t ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} .
          
          # Push unique tag only
          docker push ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}
          
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
      
      - name: Deploy to Container App
        run: |
          # Check if the container app exists
          EXISTS=$(az containerapp show --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query name -o tsv 2>/dev/null || echo "")

          if [ -z "$EXISTS" ]; then
            echo "Container app does not exist, creating..."
            az containerapp create \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --environment cae-acidni-dev \
              --image ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
              --target-port 8000 \
              --ingress external \
              --min-replicas 0 \
              --max-replicas 3 \
              --cpu 0.5 \
              --memory 1.0Gi \
              --registry-server ${{ env.AZURE_CONTAINER_REGISTRY }} \
              --registry-identity system \
              --env-vars "PYTHONUNBUFFERED=1"
          else
            echo "Container app exists, updating image..."
            az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          fi
      
      - name: Get Container App URL
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          
          echo "Deployment complete."
          echo "Service URL: https://${FQDN}"
          echo "Health check: https://${FQDN}/health"
          echo "API docs: https://${FQDN}/docs"
      
      - name: Verify deployment
        run: |
          # Container App has IP restrictions (APIM-only) — cannot call health URL directly.
          # Verify the latest revision is Running OR ScaledToZero (healthy idle, min-replicas=0).
          MAX_RETRIES=10
          SLEEP_SEC=15
          for i in $(seq 1 $MAX_RETRIES); do
            STATE=$(az containerapp revision list \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query "[0].properties.runningState" -o tsv 2>/dev/null)
            echo "Attempt $i/$MAX_RETRIES — revision state: $STATE"
            if [ "$STATE" = "Running" ] || [ "$STATE" = "ScaledToZero" ]; then
              echo "Deployment verified: latest revision is ${STATE}."
              exit 0
            fi
            sleep $SLEEP_SEC
          done
          echo "ERROR: Latest revision did not reach Running/ScaledToZero state within $((MAX_RETRIES * SLEEP_SEC))s"
          az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[0].{name:name,state:properties.runningState,replicas:properties.replicas}" -o table
          exit 1
